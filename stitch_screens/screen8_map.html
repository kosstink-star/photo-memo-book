        // Micro-interaction: Map Marker Drag Logic (Simplified Simulation)
        const mapCanvas = document.querySelector('main');
        let isDragging = false;
        let startX, scrollLeft;

        // Interaction for future expansion: dragging the bento drawer
        const bentoGrid = document.querySelector('.grid-cols-4');
        
        // Add a subtle parallax effect on markers based on mouse movement
        document.addEventListener('mousemove', (e) => {
            const markers = document.querySelectorAll('.group.cursor-pointer');
            const x = (window.innerWidth / 2 - e.pageX) / 100;
            const y = (window.innerHeight / 2 - e.pageY) / 100;
            
            markers.forEach(marker => {
                marker.style.transform = `translate(${x}px, ${y}px)`;
            });
        });

        // Atmospheric interaction: change liquid blob position subtly
        document.addEventListener('click', (e) => {
            const blob = document.querySelector('.liquid-blob');
            blob.style.transition = 'all 2s cubic-bezier(0.23, 1, 0.32, 1)';
            blob.style.left = `${e.pageX - 200}px`;
            blob.style.top = `${e.pageY - 200}px`;
        });
    </script>
